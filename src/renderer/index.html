<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Lock down to only what the renderer needs. default-src 'none' denies
         everything by default; we then re-allow scripts/styles/images/fonts from
         our own bundle. 'unsafe-inline' for styles is required by Tailwind/Framer's
         injected inline styles. connect-src allows the dev-server HMR websocket. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws:"
    />
    <title>Knob</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
